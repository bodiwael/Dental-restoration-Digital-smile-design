name: smilecraft
description: Dental Restoration Simulator - 100% on-device Flutter app for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Image processing
  image: ^4.1.7
  image_picker: ^1.0.7
  
  # ML inference
  tflite_flutter: ^0.10.4
  
  # PDF export
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # UI utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  
  # Path provider
  path_provider: ^2.1.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  
  assets:
    - assets/models/
    - assets/textures/
